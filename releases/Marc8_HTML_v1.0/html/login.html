<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <link rel="stylesheet" href="../css/brand.css" />
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/layout.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/dashboard.css" />
  <link rel="stylesheet" href="../css/tables.css" />
  <link rel="stylesheet" href="../css/forms.css" />
  <link rel="stylesheet" href="../css/charts.css" />
  <link rel="stylesheet" href="../css/utilities.css" />
  <link rel="stylesheet" href="../css/responsive.css" />
  <title>Sign In - Fleet Financial Dashboard</title>
  <style>
    .auth-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #000250; position: relative; overflow: hidden; }
    .auth-page::before { content: ''; position: absolute; inset: 0; background-image: radial-gradient(rgba(255,114,0,0.08) 1px, transparent 1px); background-size: 24px 24px; }
    .auth-page::after { content: ''; position: absolute; width: 600px; height: 600px; border-radius: 50%; background: radial-gradient(circle, rgba(24,62,235,0.08), transparent 70%); top: -200px; right: -200px; pointer-events: none; }
    .auth-glow-2 { position: absolute; width: 500px; height: 500px; border-radius: 50%; background: radial-gradient(circle, rgba(255,114,0,0.06), transparent 70%); bottom: -200px; left: -200px; pointer-events: none; }
    .auth-card { position: relative; z-index: 1; width: 100%; max-width: 420px; margin: 1rem; }
    .auth-card-inner { background: linear-gradient(135deg, rgba(15,23,42,0.85), rgba(30,41,59,0.7)); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid rgba(51,65,85,0.3); border-bottom: 1px solid rgba(255,114,0,0.15); border-radius: 1rem; padding: 2.5rem 2rem; box-shadow: 0 25px 60px rgba(0,0,0,0.5); }
    .auth-logo { display: flex; align-items: center; justify-content: center; gap: 0.75rem; margin-bottom: 0.5rem; }
    .auth-logo-icon { width: 2.5rem; height: 2.5rem; border-radius: 0.75rem; background: linear-gradient(135deg, #183eeb, #0e269d); display: flex; align-items: center; justify-content: center; }
    .auth-title { text-align: center; font-size: 1.5rem; font-weight: 700; color: white; }
    .auth-subtitle { text-align: center; font-size: 0.875rem; color: var(--muted-foreground); margin-bottom: 2rem; }
    .auth-divider { display: flex; align-items: center; gap: 1rem; margin: 1.5rem 0; }
    .auth-divider::before, .auth-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .auth-divider span { font-size: 0.8125rem; color: var(--muted-foreground); white-space: nowrap; }
    .password-toggle { position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--muted-foreground); cursor: pointer; padding: 0.25rem; }
    .password-toggle:hover { color: var(--foreground); }
    .auth-footer { text-align: center; margin-top: 2rem; font-size: 0.75rem; color: var(--muted-foreground); }
  </style>
</head>
<body class="auth-page">
  <div class="auth-glow-2"></div>
  <div class="auth-card">
    <div class="auth-card-inner">
      <div class="auth-logo">
        <div class="auth-logo-icon">
          <svg class="h-5 w-5 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 17l-1 4h16l-1-4M5 17h14M5 17l-2-8h18l-2 8M12 4l-2 5h4l-2-5"/><path d="M3 21h18"/></svg>
        </div>
        <span class="text-lg font-bold text-white">Marc8 Fleet</span>
      </div>
      <p class="auth-subtitle">Sign in to your financial command center</p>

      <form id="loginForm" onsubmit="return handleLogin(event)">
        <div class="form-group">
          <label class="input-label" for="username">Username</label>
          <input type="text" id="username" class="input" placeholder="Enter your username" value="guest" autocomplete="username" required />
        </div>
        <div class="form-group">
          <label class="input-label" for="password">Password</label>
          <div class="relative">
            <input type="password" id="password" class="input pr-10" placeholder="Enter your password" value="demo123" autocomplete="current-password" required />
            <button type="button" class="password-toggle" onclick="togglePassword()" aria-label="Toggle password visibility">
              <svg id="eyeIcon" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <div class="flex items-center justify-between mb-4">
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" class="table-checkbox" checked />
            <span class="text-sm text-secondary-300">Remember me</span>
          </label>
          <a href="#" class="text-sm text-accent hover:text-accent-400">Forgot password?</a>
        </div>
        <button type="submit" class="btn btn-primary btn-lg w-full mb-3">Sign In</button>
        <div class="auth-divider"><span>or</span></div>
        <button type="button" onclick="handleGuestLogin()" class="btn btn-outline btn-lg w-full">Continue as Guest</button>
      </form>
    </div>
    <div class="auth-footer">&copy; 2026 Marc8 Fleet Solutions Pvt Ltd. All rights reserved.</div>
  </div>

  <script>
    function togglePassword() {
      const pwd = document.getElementById('password');
      const icon = document.getElementById('eyeIcon');
      if (pwd.type === 'password') {
        pwd.type = 'text';
        icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
      } else {
        pwd.type = 'password';
        icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
      }
    }

    function handleLogin(e) {
      e.preventDefault();
      const btn = e.target.querySelector('button[type="submit"]');
      btn.classList.add('btn-loading');
      setTimeout(() => {
        btn.classList.remove('btn-loading');
        window.location.href = 'dashboard.html';
      }, 800);
      return false;
    }

    function handleGuestLogin() {
      window.location.href = 'dashboard.html';
    }
  </script>
</body>
</html>
